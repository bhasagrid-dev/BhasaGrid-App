<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Ludo Board</title>
    <link rel="stylesheet" href="css/ludo.css">
</head>
<body>
    <div class="container">
        <h1>Ludo Board</h1>
        <div class="board-wrapper">
            <div class="ludo-board">
                <!-- RED QUADRANT (Top-Left) -->
                <div class="quadrant red-quadrant top-left">
                    <!-- Home circles -->
                    <div class="home-area">
                        <div class="home-circle" data-player="red" data-token="1"></div>
                        <div class="home-circle" data-player="red" data-token="2"></div>
                        <div class="home-circle" data-player="red" data-token="3"></div>
                        <div class="home-circle" data-player="red" data-token="4"></div>
                    </div>
                    
                    <!-- Home stretch (6 cells) -->
                    <div class="home-stretch red-stretch">
                        <div class="cell home-cell" data-cell="h1-1"></div>
                        <div class="cell home-cell" data-cell="h1-2"></div>
                        <div class="cell home-cell" data-cell="h1-3"></div>
                        <div class="cell home-cell" data-cell="h1-4"></div>
                        <div class="cell home-cell" data-cell="h1-5"></div>
                        <div class="cell home-cell" data-cell="h1-6"></div>
                    </div>
                </div>

                <!-- YELLOW QUADRANT (Top-Right) -->
                <div class="quadrant yellow-quadrant top-right">
                    <!-- Home stretch (6 cells) -->
                    <div class="home-stretch yellow-stretch">
                        <div class="cell home-cell" data-cell="h4-1"></div>
                        <div class="cell home-cell" data-cell="h4-2"></div>
                        <div class="cell home-cell" data-cell="h4-3"></div>
                        <div class="cell home-cell" data-cell="h4-4"></div>
                        <div class="cell home-cell" data-cell="h4-5"></div>
                        <div class="cell home-cell" data-cell="h4-6"></div>
                    </div>
                    
                    <!-- Home circles -->
                    <div class="home-area">
                        <div class="home-circle" data-player="yellow" data-token="1"></div>
                        <div class="home-circle" data-player="yellow" data-token="2"></div>
                        <div class="home-circle" data-player="yellow" data-token="3"></div>
                        <div class="home-circle" data-player="yellow" data-token="4"></div>
                    </div>
                </div>

                <!-- BLUE QUADRANT (Bottom-Right) -->
                <div class="quadrant blue-quadrant bottom-right">
                    <!-- Home circles -->
                    <div class="home-area">
                        <div class="home-circle" data-player="blue" data-token="1"></div>
                        <div class="home-circle" data-player="blue" data-token="2"></div>
                        <div class="home-circle" data-player="blue" data-token="3"></div>
                        <div class="home-circle" data-player="blue" data-token="4"></div>
                    </div>
                    
                    <!-- Home stretch (6 cells) -->
                    <div class="home-stretch blue-stretch">
                        <div class="cell home-cell" data-cell="h3-1"></div>
                        <div class="cell home-cell" data-cell="h3-2"></div>
                        <div class="cell home-cell" data-cell="h3-3"></div>
                        <div class="cell home-cell" data-cell="h3-4"></div>
                        <div class="cell home-cell" data-cell="h3-5"></div>
                        <div class="cell home-cell" data-cell="h3-6"></div>
                    </div>
                </div>

                <!-- GREEN QUADRANT (Bottom-Left) -->
                <div class="quadrant green-quadrant bottom-left">
                    <!-- Home stretch (6 cells) -->
                    <div class="home-stretch green-stretch">
                        <div class="cell home-cell" data-cell="h2-1"></div>
                        <div class="cell home-cell" data-cell="h2-2"></div>
                        <div class="cell home-cell" data-cell="h2-3"></div>
                        <div class="cell home-cell" data-cell="h2-4"></div>
                        <div class="cell home-cell" data-cell="h2-5"></div>
                        <div class="cell home-cell" data-cell="h2-6"></div>
                    </div>
                    
                    <!-- Home circles -->
                    <div class="home-area">
                        <div class="home-circle" data-player="green" data-token="1"></div>
                        <div class="home-circle" data-player="green" data-token="2"></div>
                        <div class="home-circle" data-player="green" data-token="3"></div>
                        <div class="home-circle" data-player="green" data-token="4"></div>
                    </div>
                </div>

                <!-- CENTER FINISH AREA -->
                <div class="center-finish">
                    <div class="triangle red-triangle" data-cell="finish-red"></div>
                    <div class="triangle yellow-triangle" data-cell="finish-yellow"></div>
                    <div class="triangle blue-triangle" data-cell="finish-blue"></div>
                    <div class="triangle green-triangle" data-cell="finish-green"></div>
                </div>

                <!-- OUTER PATH (52 cells) -->
                <div class="outer-path">
                    <!-- TOP ROW (Red start) - cells 1-13 -->
                    <div class="cell outer-cell top-row" data-cell="1" data-position="top-left"></div>
                    <div class="cell outer-cell top-row" data-cell="2" data-position="top-left"></div>
                    <div class="cell outer-cell top-row" data-cell="3" data-position="top-left"></div>
                    <div class="cell outer-cell top-row" data-cell="4" data-position="top-left"></div>
                    <div class="cell outer-cell top-row" data-cell="5" data-position="top-left"></div>
                    <div class="cell outer-cell top-row safe-cell" data-cell="6" data-position="top-left">★</div>
                    <div class="cell outer-cell top-row" data-cell="7" data-position="top-center"></div>
                    <div class="cell outer-cell top-row" data-cell="8" data-position="top-right"></div>
                    <div class="cell outer-cell top-row" data-cell="9" data-position="top-right"></div>
                    <div class="cell outer-cell top-row" data-cell="10" data-position="top-right"></div>
                    <div class="cell outer-cell top-row" data-cell="11" data-position="top-right"></div>
                    <div class="cell outer-cell top-row" data-cell="12" data-position="top-right"></div>
                    <div class="cell outer-cell top-row safe-cell" data-cell="13" data-position="top-right">★</div>

                    <!-- RIGHT COLUMN (Yellow start) - cells 14-26 -->
                    <div class="cell outer-cell right-col" data-cell="14" data-position="top-right"></div>
                    <div class="cell outer-cell right-col" data-cell="15" data-position="top-right"></div>
                    <div class="cell outer-cell right-col" data-cell="16" data-position="top-right"></div>
                    <div class="cell outer-cell right-col" data-cell="17" data-position="top-right"></div>
                    <div class="cell outer-cell right-col" data-cell="18" data-position="top-right"></div>
                    <div class="cell outer-cell right-col safe-cell" data-cell="19" data-position="right-center">★</div>
                    <div class="cell outer-cell right-col" data-cell="20" data-position="bottom-right"></div>
                    <div class="cell outer-cell right-col" data-cell="21" data-position="bottom-right"></div>
                    <div class="cell outer-cell right-col" data-cell="22" data-position="bottom-right"></div>
                    <div class="cell outer-cell right-col" data-cell="23" data-position="bottom-right"></div>
                    <div class="cell outer-cell right-col" data-cell="24" data-position="bottom-right"></div>
                    <div class="cell outer-cell right-col safe-cell" data-cell="25" data-position="bottom-right">★</div>
                    <div class="cell outer-cell right-col" data-cell="26" data-position="bottom-right"></div>

                    <!-- BOTTOM ROW (Blue start) - cells 27-39 -->
                    <div class="cell outer-cell bottom-row" data-cell="27" data-position="bottom-right"></div>
                    <div class="cell outer-cell bottom-row" data-cell="28" data-position="bottom-right"></div>
                    <div class="cell outer-cell bottom-row" data-cell="29" data-position="bottom-right"></div>
                    <div class="cell outer-cell bottom-row" data-cell="30" data-position="bottom-right"></div>
                    <div class="cell outer-cell bottom-row" data-cell="31" data-position="bottom-right"></div>
                    <div class="cell outer-cell bottom-row safe-cell" data-cell="32" data-position="bottom-right">★</div>
                    <div class="cell outer-cell bottom-row" data-cell="33" data-position="bottom-center"></div>
                    <div class="cell outer-cell bottom-row" data-cell="34" data-position="bottom-left"></div>
                    <div class="cell outer-cell bottom-row" data-cell="35" data-position="bottom-left"></div>
                    <div class="cell outer-cell bottom-row" data-cell="36" data-position="bottom-left"></div>
                    <div class="cell outer-cell bottom-row" data-cell="37" data-position="bottom-left"></div>
                    <div class="cell outer-cell bottom-row" data-cell="38" data-position="bottom-left"></div>
                    <div class="cell outer-cell bottom-row safe-cell" data-cell="39" data-position="bottom-left">★</div>

                    <!-- LEFT COLUMN (Green start) - cells 40-52 -->
                    <div class="cell outer-cell left-col" data-cell="40" data-position="bottom-left"></div>
                    <div class="cell outer-cell left-col" data-cell="41" data-position="bottom-left"></div>
                    <div class="cell outer-cell left-col" data-cell="42" data-position="bottom-left"></div>
                    <div class="cell outer-cell left-col" data-cell="43" data-position="bottom-left"></div>
                    <div class="cell outer-cell left-col" data-cell="44" data-position="bottom-left"></div>
                    <div class="cell outer-cell left-col safe-cell" data-cell="45" data-position="left-center">★</div>
                    <div class="cell outer-cell left-col" data-cell="46" data-position="top-left"></div>
                    <div class="cell outer-cell left-col" data-cell="47" data-position="top-left"></div>
                    <div class="cell outer-cell left-col" data-cell="48" data-position="top-left"></div>
                    <div class="cell outer-cell left-col" data-cell="49" data-position="top-left"></div>
                    <div class="cell outer-cell left-col" data-cell="50" data-position="top-left"></div>
                    <div class="cell outer-cell left-col safe-cell" data-cell="51" data-position="top-left">★</div>
                    <div class="cell outer-cell left-col" data-cell="52" data-position="top-left"></div>
                </div>
            </div>
        </div>
        
        <!-- Info panel -->
        <div class="info-panel">
            <h2>Classic Indian Ludo Board</h2>
            <p>Traditional 4-player board with accurate layout</p>
            <ul>
                <li>52 outer cells + 6 home stretch cells per player</li>
                <li>8 safe cells (marked with ★)</li>
                <li>Central finish area</li>
                <li>4 tokens per player</li>
            </ul>
        </div>
    </div>

    <script src="js/ludogame.js"></script>
</body>
</html>
