<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status - BhasaGrid</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicons/error-favicon.svg">
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase SDKs (Compat) -->
    <script src="js/vendor/firebase-app-compat.js"></script>
    <script src="js/vendor/firebase-firestore-compat.js"></script>
    <!-- Firebase Configuration (Exposes window.db) -->
    <script src="js/firebase-config.js?v=1.0.6"></script>

    <style>
        :root {
            --primary-color: var(--accent-purple, #a855f7); /* Default purple matched to portal theme */
            --bg-color: var(--bg-primary, #050505);
        }

        body {
            background-color: var(--bg-color) !important;
            color: var(--text-primary) !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease !important;
        }

        /* Red Theme Class */
        body.locked-mode {
            --primary-color: #ff3333;
            background-image: 
                linear-gradient(rgba(255, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03) 1px, transparent 1px) !important;
        }

        h1 {
            color: var(--primary-color) !important;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            display: inline-block;
        }

        .error-container {
            width: 100%;
            margin: 40px 0;
        }

        .error-message {
            color: var(--accent-orange, #ea580c) !important;
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(234, 88, 12, 0.2);
            animation: pulse 2s infinite;
            line-height: 1.1;
            word-wrap: break-word;
        }

        body.locked-mode .error-message {
            color: #ff3333 !important;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        .status-text {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.8;
            color: var(--text-secondary) !important;
        }

        .timer {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            color: var(--text-primary) !important;
            margin: 20px 0;
            font-weight: bold;
            display: none; /* Hidden by default */
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .action-btn {
            background: var(--glass-bg) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--glass-border) !important;
            backdrop-filter: blur(5px);
            padding: 12px 24px;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            border-radius: 8px;
            font-family: inherit;
        }

        .action-btn:hover {
            background: var(--primary-color) !important;
            color: #ffffff !important;
            box-shadow: 0 0 15px var(--primary-color);
            border-color: var(--primary-color) !important;
        }

        h1 {
            color: var(--primary-color) !important;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            display: inline-block;
            font-family: inherit !important;
        }
    </style>
</head>
<body>
    <!-- Modern Dynamic Background -->
    <div class="portal-background"></div>
    
    <h1 id="pageTitle">BhasaGrid Portal</h1>
    
    <div class="error-container">
        <div class="error-message" id="mainMessage">ERROR 404</div>
        <div class="status-text" id="statusMessage">Page Not Found</div>
    </div>

    <div class="timer" id="countdown">--:--</div>

    <div id="adminPanel" style="display: none; margin-top: 30px; border: 1px solid #ff3333; padding: 20px; width: 90%; max-width: 500px; background: rgba(255, 51, 51, 0.05); border-radius: 8px;">
        <div style="font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: #ff6666; text-transform: uppercase;">Support Assistance</div>
        <div style="font-size: 0.9rem; margin-bottom: 5px; color: #ffcccc;">Ticket Reference ID:</div>
        <div style="font-size: 1.5rem; font-weight: bold; color: #ffffff; letter-spacing: 1px; margin-bottom: 10px;" id="ticketId">--</div>
        <div style="font-size: 0.85rem; color: #ff6666;">Please provide this ID to the administrator to unlock your account.</div>
    </div>

    <a href="/" id="actionButton" class="action-btn">[ Return to Home ]</a>

    <script>
        // Configuration
        let LOCKOUT_DURATION = 30 * 1000; // 30 seconds in ms

        function scrambleText(element, finalString) {
            let iteration = 0;
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
            clearInterval(element.scrambleInterval);
            
            element.scrambleInterval = setInterval(() => {
                element.innerText = finalString.split('').map((char, index) => {
                    if (index < iteration) {
                        return finalString[index];
                    }
                    if (char === ' ') return ' ';
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join('');
                
                if (iteration >= finalString.length) {
                    clearInterval(element.scrambleInterval);
                }
                iteration += 1.5;
            }, 15);
        }

        function init() {
            // Load and apply theme synchronization instantly
            const currentTheme = localStorage.getItem('bhasagrid-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.body.style.visibility = 'visible';

            const params = new URLSearchParams(window.location.search);
            const isLockout = params.get('error') === 'locked';
            const isServerDown = params.get('error') === 'server_down';
            const lockoutTimestamp = localStorage.getItem('lockoutTimestamp');
            const severity = params.get('severity');

            if (severity === 'high' || localStorage.getItem('severeLockout') === 'true') {
                LOCKOUT_DURATION = 5 * 60 * 1000; // 5 minutes for too-many-requests
                localStorage.setItem('severeLockout', 'true');
            }

            // Determine Mode
            if (isServerDown) {
                activateServerDownMode();
            } else if (isLockout || (lockoutTimestamp && isActiveLockout(lockoutTimestamp))) {
                activateLockoutMode(parseInt(lockoutTimestamp));
            } else {
                activate404Mode();
            }
        }

        function isActiveLockout(timestamp) {
            return (Date.now() - timestamp) < LOCKOUT_DURATION;
        }

        function activateLockoutMode(timestamp) {
            // Check if timestamp exists, if not set it
            if (!timestamp) {
                timestamp = Date.now();
                localStorage.setItem('lockoutTimestamp', timestamp);
            }

            document.body.classList.add('locked-mode');
            scrambleText(document.getElementById('pageTitle'), "SECURITY ALERT");
            scrambleText(document.getElementById('mainMessage'), "ACCESS LOCKED");
            scrambleText(document.getElementById('statusMessage'), "Maximum attempts exceeded.");
            document.getElementById('statusMessage').style.display = 'block';
            document.getElementById('countdown').style.display = 'block';
            // Logic: Only show ticket after repeated access attempts
            handleTicketDisplay(timestamp);

            // Hide Manual Buttons initially
            const btn = document.getElementById('actionButton');
            btn.style.display = "none"; 

            startTimer(timestamp);
        }

        function handleTicketDisplay(timestamp) {
            // Get visit count for this lockout session
            // We use a separate key to track how many times they've specifically looked at the LOCKOUT screen
            
            const TWELVE_HOURS = 12 * 60 * 60 * 1000;
            let visits = JSON.parse(localStorage.getItem('lockoutVisits') || '{"count": 0, "firstSeen": 0}');
            const now = Date.now();

            // Reset if older than 12 hours
            if (now - visits.firstSeen > TWELVE_HOURS) {
                visits = { count: 0, firstSeen: now };
            }

            // Increment visit count
            visits.count++;
            localStorage.setItem('lockoutVisits', JSON.stringify(visits));

            // Only show Admin/Support Ticket if they have checked this page > 3 times
            // "same ip address same date ... tries to access ... clicks whatever" -> Persistent user
            if (visits.count >= 3) {
                 generateTicket(timestamp);
            } else {
                document.getElementById('adminPanel').style.display = 'none';
            }
        }

        function generateTicket(timestamp) {
            const adminPanel = document.getElementById('adminPanel');
            const ticketIdDiv = document.getElementById('ticketId');

            // Generate or retrieve consistent Ticket ID for this lockout
            let ticketId = localStorage.getItem('currentLockoutTicket');
            if (!ticketId) {
                const randomSuffix = Math.floor(Math.random() * 9000) + 1000;
                ticketId = `SEC-${timestamp.toString().slice(-6)}-${randomSuffix}`;
                localStorage.setItem('currentLockoutTicket', ticketId);
                
                // Log to Firebase Firestore only when first generated
                if (window.db) {
                    window.db.collection('security_lockouts').doc(ticketId).set({
                        ticketId: ticketId,
                        timestamp: new Date(timestamp),
                        userAgent: navigator.userAgent,
                        resolution: `${window.innerWidth}x${window.innerHeight}`,
                        status: 'LOCKED',
                        language: navigator.language,
                        url: window.location.href
                    }).catch(err => console.error("Failed to log security event", err));
                }
            }
            
            scrambleText(ticketIdDiv, ticketId);
            adminPanel.style.display = "block";
        }

        function activateServerDownMode() {
            document.body.classList.remove('locked-mode');
            scrambleText(document.getElementById('pageTitle'), "BhasaGrid PORTAL");
            scrambleText(document.getElementById('mainMessage'), "MAINTENANCE ACTIVE");
            
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.style.display = 'block';
            scrambleText(statusMsg, "Our servers are temporarily offline due to technical adjustments. Please try again shortly.");
            
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            
            const btn = document.getElementById('actionButton');
            btn.style.display = "inline-block";
            btn.href = "/";
            scrambleText(btn, "[ TRY RECONNECTING ]");
            btn.onclick = null;
        }

        function activate404Mode() {
            document.body.classList.remove('locked-mode');
            scrambleText(document.getElementById('pageTitle'), "BhasaGrid PORTAL");
            scrambleText(document.getElementById('mainMessage'), "ERROR 404: PAGE NOT FOUND");
            document.getElementById('statusMessage').style.display = 'none'; 
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            
            const btn = document.getElementById('actionButton');
            btn.style.display = "inline-block";
            btn.href = "/";
            scrambleText(btn, "[ RETURN TO HOME ]");
            btn.onclick = null;
        }

        // ... existing startTimer, unlockSystem, etc ...

        function startTimer(startTime) {
            let lastUpdate = 0;
            function update(timestamp) {
                if (!lastUpdate) lastUpdate = timestamp;
                
                // Throttle updates for a smoother, less chaotic "digital" feel
                if (timestamp - lastUpdate >= 30) {
                    lastUpdate = timestamp;
                    const now = Date.now();
                    const elapsed = now - startTime;
                    const remaining = LOCKOUT_DURATION - elapsed;

                    if (remaining <= 0) {
                        document.getElementById('countdown').innerText = "00:00:00";
                        unlockSystem();
                        return;
                    } else {
                        const minutes = Math.floor(remaining / 60000);
                        const seconds = Math.floor((remaining % 60000) / 1000);
                        const ms = Math.floor((remaining % 1000) / 10); // 2 digits for ms
                        
                        document.getElementById('countdown').innerText = 
                            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}:${ms.toString().padStart(2, '0')}`;
                    }
                }
                requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function unlockSystem() {
            localStorage.removeItem('lockoutTimestamp');
            localStorage.removeItem('failedAttempts');
            localStorage.removeItem('currentLockoutTicket');
            localStorage.removeItem('severeLockout');
            
            scrambleText(document.getElementById('mainMessage'), "ACCESS RESTORED");
            scrambleText(document.getElementById('statusMessage'), "Redirecting...");
            document.getElementById('adminPanel').style.display = 'none'; // Hide admin on unlock

            // Show manual button
            const btn = document.getElementById('actionButton');
            btn.style.display = "inline-block";
            scrambleText(btn, "[ MANUAL RELOAD ]");
            btn.href = "/";
            btn.onclick = null;

            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        }

        // Run
        init();
    </script>
    <script src="js/network-monitor.js"></script>
</body>
</html>
