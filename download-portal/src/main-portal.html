<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerOrbit - Secure Social Discovery</title>

    <!-- favicons -->
    <link rel="icon" type="image/webp" href="assets/favicons/access-portal-favicon.webp">
    <link rel="shortcut icon" type="image/webp" href="assets/favicons/access-portal-favicon.webp">
    <!-- Fallback for browsers that don't support WebP favicons -->
    <link rel="alternate icon" type="image/png" href="assets/logos/innerorbit-logo.png">
    

    
    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- React & ReactDOM -->
    <script src="js/vendor/react.min.js"></script>
    <script src="js/vendor/react-dom.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="js/vendor/babel.min.js"></script>
    
    <!-- AngularJS -->
    <script src="js/vendor/angular.min.js"></script>
    
    <!-- Animations -->
    <script src="js/vendor/gsap.min.js"></script>
    <script src="js/vendor/ScrollTrigger.min.js"></script>
    <script src="js/vendor/lenis.min.js"></script>

    <!-- Authentication Logic -->
    <script src="js/authentication.js"></script>
    <!-- Angular Docs Logic -->
    <script src="js/docs.js"></script>
    <!-- Network Monitor (Offline Support) -->
    <script src="js/network-monitor.js"></script>

    <!-- Firebase SDKs -->
    <script src="js/vendor/firebase-app-compat.js"></script>
    <script src="js/vendor/firebase-firestore-compat.js"></script>
</head>
  
<body>
    <!-- Modern Dynamic Background -->
    <div class="portal-background"></div>
    
    <!-- Modern Dynamic Background (Handled by CSS) -->

    <!-- Navbar Logo Landing Pad is now handled dynamically by React to ensure perfect positioning -->


    <div id="react-root"></div>
    <div id="angular-docs-root" ng-controller="DocsController"></div>

    <!-- Documentation Link Modal -->
    <div id="docsLinkModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(2, 6, 23, 0.7); backdrop-filter: blur(8px); z-index:999; justify-content:center; align-items:center;">
        <div class="crystal-card" style="padding:2rem; max-width:400px; text-align:center;">
            <h2 style="color:var(--text-primary); margin-bottom:1rem;">Documentation</h2>
            <p style="color:var(--text-secondary); margin-bottom:2rem;">Access our comprehensive documentation covering features, installation, security, and more.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="docs.html" style="display:inline-block; padding:0.75rem 1.5rem; background:linear-gradient(135deg, var(--accent-purple), var(--accent-orange)); color:white; text-decoration:none; border-radius:12px; font-weight:600; transition: transform 0.2s;">View Docs</a>
                <button id="closeDocsModal" style="padding:0.75rem 1.5rem; background:rgba(255,255,255,0.05); color:var(--text-primary); border:1px solid var(--glass-border); border-radius:12px; cursor:pointer; font-weight:600; transition: background 0.2s;">Close</button>
            </div>
        </div>
    </div>

    <!-- Custom Notification Modal -->
    <div id="customModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(2, 6, 23, 0.7); backdrop-filter: blur(12px); z-index:10000; justify-content:center; align-items:center;">
        <div class="crystal-card" style="padding:2.5rem; max-width:420px; width:90%; text-align:center;">
            <div id="customModalIcon" style="font-size: 3rem; margin-bottom: 1rem;">✨</div>
            <h2 id="customModalTitle" style="color:var(--text-primary); margin-bottom:1rem; font-weight:700;">Notification</h2>
            <p id="customModalMessage" style="color:var(--text-secondary); margin-bottom:2rem; line-height:1.6;">Message goes here.</p>
            <button id="closeCustomModal" style="padding:12px 32px; background:linear-gradient(135deg, var(--accent-purple), var(--accent-orange)); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:600; font-size:1rem; transition: transform 0.2s;">Got it</button>
        </div>
    </div>

    <!-- Main Logic (React + Angular + Legacy) -->
    <script type="text/babel" src="js/script.js" defer></script>
    <script>
        // Docs modal functionality
        const docsModal = document.getElementById('docsLinkModal');
        const closeDocsBtn = document.getElementById('closeDocsModal');
        
        closeDocsBtn?.addEventListener('click', () => {
            docsModal.style.display = 'none';
        });

        // Make docs accessible through the UI
        window.openDocs = () => {
            window.location.href = 'docs.html';
        };
    </script>
</body>
</html>
